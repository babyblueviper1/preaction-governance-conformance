name: conformance

# Proves the portable reproduction claim runs green, independent of any framework:
# the offline zero-dependency suite + the AG2 Beta external-attestation contract triple
# both recompute their verdicts from bytes on every push/PR.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Conformance suite (offline, zero-dep)
        run: python3 run_conformance.py
      - name: AG2 Beta external-attestation contract triple
        run: python3 examples/ag2-beta/check_triple.py
      - name: Per-entry ledger recompute (re-derives to sound + tamper negative)
        run: python3 examples/ledger-recompute/recompute_entry.py
      - name: Canonicalization-profile resolution (content-addressed + action_ref reproducible)
        run: python3 examples/profile-resolution/resolve_profile.py
      - name: Benchmark grade (recompute a submitted trace dump from its bytes)
        run: python3 examples/benchmark-grade/grade_traces.py
      - name: Crosswalk recompute (a vocabulary mapping is a recomputation, not an assertion)
        run: python3 examples/crosswalk-recompute/check_crosswalk.py
      - name: action_id canonicalization (cross-impl convergence is recomputed, field-set delta named)
        run: python3 examples/action-id-canonicalization/check_action_id.py
      - name: decision_ref recompute (the pre-execution decision is recomputable, not asserted)
        run: python3 examples/decision-ref-recompute/check_decision_ref.py
